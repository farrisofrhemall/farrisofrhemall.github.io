<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The ADHD Herbalist | Thrive with Neurodiversity</title>

<style>
:root {
--bg-dark: #0f172a;
--bg-card: #1e293b;
--teal-calm: #0d9488;
--teal-light: #2dd4bf;
--coral-excite: #f97316;
--coral-hover: #ea580c;
--sage-soothe: #86efac;
--text-light: #f8fafc;
--text-muted: #94a3b8;
}

* {
box-sizing: border-box;
margin: 0;
padding: 0;
font-family: 'Outfit', sans-serif;
scroll-behavior: smooth;
}

body {
background-color: var(--bg-dark);
color: var(--text-light);
line-height: 1.6;
overflow-x: hidden;
}

h1, h2, h3 {
font-family: 'Space Grotesk', sans-serif;
font-weight: 700;
}

/* Navigation */
nav {
display: flex;
justify-content: space-between;
align-items: center;
padding: 1.5rem 2rem;
background: rgba(15, 23, 42, 0.8);

position: sticky;
top: 0;
z-index: 100;
border-bottom: 1px solid rgba(255,255,255,0.1);
}

.logo {
font-size: 1.5rem;
font-weight: 700;
color: var(--teal-light);
display: flex;
align-items: center;
gap: 0.5rem;
text-decoration: none;
}

.nav-links {
display: flex;
gap: 1.5rem;
}

.nav-links a {
color: var(--text-light);
text-decoration: none;
font-weight: 600;
transition: color 0.3s;
}

.nav-links a:hover {
color: var(--coral-excite);
}
